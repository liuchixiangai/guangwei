<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Continuous Pulse & Glow for Interaction Button */
        @keyframes pulse-gold-glow {
            0%, 100% { 
                box-shadow: 0 0 15px 2px rgba(255, 215, 0, 0.4), 0 0 25px 5px rgba(255, 153, 0, 0.2); 
                transform: scale(1); 
            }
            50% { 
                box-shadow: 0 0 30px 12px rgba(255, 215, 0, 0.8), 0 0 50px 20px rgba(255, 153, 0, 0.4); 
                transform: scale(1.05); 
            }
        }
        .animate-pulse-gold { animation: pulse-gold-glow 2s infinite ease-in-out; }
        
        /* Video Breathing Border */
        @keyframes breathing-gold {
            0%, 100% { border-color: rgba(255, 215, 0, 0.6); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
            50% { border-color: rgba(255, 215, 0, 1); box-shadow: 0 0 25px rgba(255, 215, 0, 0.5), inset 0 0 15px rgba(255, 215, 0, 0.3); }
        }
        .animate-video-border { animation: breathing-gold 3s infinite ease-in-out; }

        /* LIVE Pulse Dot */
        @keyframes live-pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .animate-live-dot { animation: live-pulse 1.5s infinite ease-in-out; }
        
        /* Marquee */
        .marquee-content { display: flex; animation: marquee 30s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* Silk Background */
        .silk-bg {
            background: linear-gradient(135deg, #8b0000 0%, #d40000 50%, #8b0000 100%);
            position: relative;
            overflow: hidden;
        }
        .silk-wave {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at center, transparent 30%, rgba(255,215,0,0.05) 70%);
            transform: rotate(30deg);
            pointer-events: none;
        }
        
        /* Blessing Wall Auto-scroll */
        @keyframes vertical-scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        .scrolling-wall {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: vertical-scroll 25s linear infinite;
        }
        .scrolling-wall:hover { animation-play-state: paused; }

        /* Entrance Animations */
        @keyframes slide-up-fade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .entrance-anim {
            opacity: 0;
            animation: slide-up-fade 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Danmu Style */
        .danmu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 5;
        }

        /* Premium Header Effects */
        .premium-header {
            background: linear-gradient(135deg, #a50000 0%, #ff0000 50%, #a50000 100%);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .header-scanning-line {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 225, 109, 0.1), transparent);
            animation: scan-line 4s linear infinite;
            pointer-events: none;
        }
        
        @keyframes scan-line {
            0% { transform: translateX(0); }
            100% { transform: translateX(200%); }
        }

        .halo-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            animation: halo-pulse 3s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes halo-pulse {
            from { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            to { transform: translate(-50%, -50%) scale(1.4); opacity: 0.6; }
        }

        .text-liquid-gold {
            background: linear-gradient(
                to bottom,
                #fff7d1 0%,
                #ffd700 25%,
                #b8860b 50%,
                #ffd700 75%,
                #fff7d1 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 2px 0 rgba(0,0,0,0.8)) drop-shadow(0 0 10px rgba(255,215,0,0.5));
            letter-spacing: 1px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .header-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .gold-sparkle {
            position: absolute;
            background: radial-gradient(circle, #ffe16d 0%, transparent 80%);
            border-radius: 50%;
            opacity: 0;
            animation: sparkle-float 3s infinite linear;
        }

        @keyframes sparkle-float {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translate(var(--tw-translate-x), var(--tw-translate-y)) scale(1); opacity: 0; }
        }
    </style>
<style>
        body {

<body class="bg-surface text-on-surface font-body-sm scroll-hide selection:bg-secondary-fixed selection:text-on-secondary-fixed">

<div class="relative z-10 flex flex-col items-center gap-3">

</div>
<h1 class="font-display-lg text-[26px] leading-[1.2] px-4 text-liquid-gold drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]">
            涡阳县犇鑫学校<br/>中考送考直播间

<div class="w-3/4 h-[1px] bg-gradient-to-r from-transparent via-secondary-fixed/60 to-transparent"></div>

<!-- Main Content -->

<input class="flex-1 bg-white/10 border-white/20 rounded-xl text-white placeholder:text-white/40 focus:ring-secondary-fixed focus:border-secondary-fixed py-3 px-4 font-body-lg" id="candidateName" placeholder="输入考生姓名" type="text"/>
<button class="bg-gradient-to-br from-secondary-fixed to-[#FF9900] text-on-secondary-fixed font-label-bold px-6 py-3 rounded-xl active:scale-95 transition-transform shadow-[0_0_15px_rgba(255,215,0,0.4)]" onclick="submitBlessing()">

<!-- Effect Layer -->
<div class="fixed inset-0 pointer-events-none z-[100] overflow-hidden hidden" id="confettiEffect"></div>
<script>
    // Header Sparkles Generation
    function createHeaderSparkles() {
        const container = document.getElementById('headerSparkles');
        const count = 25;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'gold-sparkle';
            const size = Math.random() * 5 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;
            
            // Random float directions
            const tx = (Math.random() - 0.5) * 100;
            const ty = -(Math.random() * 50 + 20);
            p.style.setProperty('--tw-translate-x', `${tx}px`);
            p.style.setProperty('--tw-translate-y', `${ty}px`);
            
            p.style.animationDelay = `${Math.random() * 5}s`;
            p.style.animationDuration = `${Math.random() * 3 + 2}s`;
            container.appendChild(p);
        }
    }
    createHeaderSparkles();

    // Particle System for Background
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.init();
        }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 100;
            this.size = Math.random() * 2 + 1;
            this.speedY = Math.random() * 1 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.opacity = Math.random() * 0.5 + 0.3;
            this.color = `rgba(255, ${Math.floor(Math.random() * 100 + 155)}, 0, ${this.opacity})`;
        }
        update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            if (this.y < -10) this.init();
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 50; i++) {
        particles.push(new Particle());
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Blessing Submission Logic (API-backed, 7-day retention)
    const BLESS_PHRASES = ["金榜题名，前程似锦！","旗开得胜，超常发挥！","金榜题名，马到成功！","执笔为剑，斩获辉煌！","功成名就，圆梦中考！","加油！你是最棒的！"];

    async function submitBlessing() {
        const input = document.getElementById('candidateName');
        const name = input.value.trim();
        
        if (!name) {
            input.classList.add('border-red-500');
            setTimeout(() => input.classList.remove('border-red-500'), 1000);
            return;
        }

        try {
            const resp = await fetch('/api/blessing', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name})
            });
            const data = await resp.json();
            if (data.success) {
                triggerConfetti();
                createDanmu(data.name);
                prependBlessing(data.name);
                document.getElementById('blessCount').textContent = data.total + ' 条祝福';
                input.value = '';
            }
        } catch(e) {
            // fallback: still show local animation
            triggerConfetti();
            createDanmu(name);
            prependBlessing(name);
            input.value = '';
        }
    }

    function prependBlessing(name) {
        const list = document.getElementById('blessing-list');
        const phrase = BLESS_PHRASES[Math.floor(Math.random() * BLESS_PHRASES.length)];
        const newCard = document.createElement('div');
        newCard.className = 'glass-card rounded-xl p-4 flex flex-col justify-center border-l-4 border-secondary-fixed';
        newCard.innerHTML = '<p class="text-secondary-fixed font-headline-md leading-tight">祝【' + escHtml(name) + '】' + phrase + '</p>';
        list.insertBefore(newCard, list.firstChild);
    }

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // Load blessings from server on page load
    async function loadBlessings() {
        try {
            const resp = await fetch('/api/blessings');
            const data = await resp.json();
            document.getElementById('blessCount').textContent = data.total + ' 条祝福';
            const list = document.getElementById('blessing-list');
            list.innerHTML = '';
            // Duplicate for seamless loop
            const render = (items) => {
                items.forEach(b => {
                    const phrase = BLESS_PHRASES[Math.floor(Math.random() * BLESS_PHRASES.length)];
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-xl p-4 flex flex-col justify-center border-l-4 border-secondary-fixed';
                    card.innerHTML = '<p class="text-secondary-fixed font-headline-md leading-tight">祝【' + escHtml(b.name) + '】' + phrase + '</p>';
                    list.appendChild(card);
                });
            };
            if (data.blessings.length) {
                render(data.blessings);
                // Duplicate for smooth infinite scroll
                render(data.blessings);
            } else {
                // Default seed
                ['张嘉豪','刘欣雅','王博','陈美玲','李一凡','周子豪'].forEach(n => {
                    const phrase = BLESS_PHRASES[Math.floor(Math.random() * BLESS_PHRASES.length)];
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-xl p-4 flex flex-col justify-center border-l-4 border-secondary-fixed';
                    card.innerHTML = '<p class="text-secondary-fixed font-headline-md leading-tight">祝【'+n+'】'+phrase+'</p>';
                    list.appendChild(card);
                });
            }
        } catch(e) {
            console.error('load blessings error', e);
        }
    }

    loadBlessings();
    }

    // Danmu (Bullet Curtain) Effect
    function createDanmu(name) {
        const container = document.getElementById('danmuContainer');
        const danmu = document.createElement('div');
        const blessings = ["中考必胜", "金榜题名", "超常发挥", "旗开得胜", "加油加油", "一举夺魁"];
        const randomBlessing = blessings[Math.floor(Math.random() * blessings.length)];
        
        danmu.innerText = `祝【${name}】${randomBlessing}！✨`;
        danmu.className = 'absolute whitespace-nowrap text-secondary-fixed font-bold text-sm bg-black/60 backdrop-blur-sm border border-secondary-fixed/30 px-3 py-1 rounded-full shadow-lg z-20';
        
        const top = Math.random() * 70 + 10; 
        danmu.style.top = `${top}%`;
        danmu.style.left = '100%';
        danmu.style.transition = `transform ${Math.random() * 4 + 5}s linear`;
        
        container.appendChild(danmu);

        // Animate
        setTimeout(() => {
            danmu.style.transform = `translateX(-${window.innerWidth + 300}px)`;
        }, 50);

        setTimeout(() => {
            danmu.remove();
        }, 11000);
    }

    // Confetti Burst Effect
    function triggerConfetti() {
        const container = document.getElementById('confettiEffect');
        container.classList.remove('hidden');
        
        const colors = ['#FFD700', '#FF9900', '#FFFFFF', '#FF4D4D'];
        
        for (let i = 0; i < 40; i++) {
            const confetti = document.createElement('div');
            confetti.style.position = 'absolute';
            confetti.style.width = Math.random() * 10 + 5 + 'px';
            confetti.style.height = Math.random() * 5 + 2 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = '50%';
            confetti.style.bottom = '50%';
            confetti.style.opacity = '1';
            confetti.style.borderRadius = '2px';
            confetti.style.transition = `all ${Math.random() * 1 + 1}s cubic-bezier(0.1, 0.7, 1.0, 0.1)`;
            
            container.appendChild(confetti);

            setTimeout(() => {
                const tx = (Math.random() - 0.5) * 800;
                const ty = -(Math.random() * 600 + 200);
                const rot = Math.random() * 720;
                confetti.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
                confetti.style.opacity = '0';
            }, 10);

            setTimeout(() => {
                confetti.remove();
                if (container.children.length === 0) {
                    container.classList.add('hidden');
                }
            }, 2000);
        }
        
        if (window.navigator.vibrate) {
            window.navigator.vibrate(50);
        }
    }
</script>
