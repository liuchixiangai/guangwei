<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namebar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:1920px;height:1080px;overflow:hidden;
  background:transparent!important;
}
#namebar{
  position:fixed;left:160px;bottom:170px;
  opacity:1;
  pointer-events:none;
}
.nb{
  position:relative;padding:18px 32px 14px 28px;display:inline-block;
  background:transparent;
  border:none;
}
.nb-line{
  position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:2px;
}
.nb-name{display:block;font-size:56px;font-weight:700;line-height:1.2;white-space:nowrap}
.nb-title{display:block;font-size:26px;font-weight:400;margin-top:6px;line-height:1.4;max-width:800px;white-space:normal;word-break:break-word}
.nb-title2{display:block;font-size:22px;font-weight:400;margin-top:2px;line-height:1.4;max-width:800px}
.nb-glow{display:block;margin-top:10px;width:200px;height:2px;border-radius:1px}

/* ===== Color Schemes ===== */
/* red 赤 */
.scheme-red .nb-line{background:linear-gradient(180deg,#EF4444,#FCA5A5)}
.scheme-red .nb-name{color:#FEE2E2}
.scheme-red .nb-title{color:#FCA5A5}
.scheme-red .nb-title2{color:rgba(252,165,165,.6)}
.scheme-red .nb-glow{background:linear-gradient(90deg,#EF4444,transparent)}
/* orange 橙 */
.scheme-orange .nb-line{background:linear-gradient(180deg,#F97316,#FDBA74)}
.scheme-orange .nb-name{color:#FFF7ED}
.scheme-orange .nb-title{color:#FDBA74}
.scheme-orange .nb-title2{color:rgba(253,186,116,.6)}
.scheme-orange .nb-glow{background:linear-gradient(90deg,#F97316,transparent)}
/* yellow 黄 */
.scheme-yellow .nb-line{background:linear-gradient(180deg,#EAB308,#FDE047)}
.scheme-yellow .nb-name{color:#FEFCE8}
.scheme-yellow .nb-title{color:#FDE047}
.scheme-yellow .nb-title2{color:rgba(253,224,71,.55)}
.scheme-yellow .nb-glow{background:linear-gradient(90deg,#EAB308,transparent)}
/* green 绿 */
.scheme-green .nb-line{background:linear-gradient(180deg,#22C55E,#86EFAC)}
.scheme-green .nb-name{color:#F0FDF4}
.scheme-green .nb-title{color:#86EFAC}
.scheme-green .nb-title2{color:rgba(134,239,172,.6)}
.scheme-green .nb-glow{background:linear-gradient(90deg,#22C55E,transparent)}
/* cyan 青 */
.scheme-cyan .nb-line{background:linear-gradient(180deg,#06B6D4,#67E8F9)}
.scheme-cyan .nb-name{color:#ECFEFF}
.scheme-cyan .nb-title{color:#67E8F9}
.scheme-cyan .nb-title2{color:rgba(103,232,249,.6)}
.scheme-cyan .nb-glow{background:linear-gradient(90deg,#06B6D4,transparent)}
/* blue 蓝 (default) */
.scheme-blue .nb-line{background:linear-gradient(180deg,#3B82F6,#93C5FD)}
.scheme-blue .nb-name{color:#EFF6FF}
.scheme-blue .nb-title{color:#93C5FD}
.scheme-blue .nb-title2{color:rgba(147,197,253,.6)}
.scheme-blue .nb-glow{background:linear-gradient(90deg,#3B82F6,transparent)}
/* purple 紫 */
.scheme-purple .nb-line{background:linear-gradient(180deg,#8B5CF6,#C4B5FD)}
.scheme-purple .nb-name{color:#F5F3FF}
.scheme-purple .nb-title{color:#C4B5FD}
.scheme-purple .nb-title2{color:rgba(196,181,253,.6)}
.scheme-purple .nb-glow{background:linear-gradient(90deg,#8B5CF6,transparent)}

/* Templates */
.nb-a .nb-name{font-size:36px;display:inline}
.nb-a .nb-title{font-size:26px;display:inline;margin:0}
.nb-a .nb-title2{display:none}
.nb-c .nb-name{font-size:60px}
.nb-c .nb-title{font-size:24px;max-width:1000px}
.nb-c .nb-title2{font-size:20px;max-width:1000px}
.nb-d{padding:16px 28px}
.nb-d .nb-name{font-size:42px}
.nb-d .nb-title{font-size:20px}
.nb-d .nb-title2{font-size:18px}
.nb-e .nb-name{font-size:52px}
.nb-e .nb-title{font-size:24px;max-width:850px}
.nb-e .nb-title2{font-size:22px;max-width:850px;margin-top:4px}
.nb-f{padding:14px 28px;background:transparent}
.nb-f .nb-name{font-size:40px;display:inline}
.nb-f .nb-title{font-size:20px;display:inline;margin-left:14px}
.nb-f .nb-title2{display:none}
.nb-f .nb-glow{display:none}
.nb-f .nb-line{width:3px}
</style>
</head>
<body>

<div id="namebar" class="scheme-blue">
  <div class="nb nb-b" id="nb-inner">
    <div class="nb-line"></div>
    <span class="nb-name" id="nbName">--</span>
    <span class="nb-title" id="nbTitle"></span>
    <span class="nb-title2" id="nbTitle2"></span>
    <span class="nb-glow"></span>
  </div>
</div>

<script>
(function(){
  var bar = document.getElementById('namebar');
  var inner = document.getElementById('nb-inner');
  var elName = document.getElementById('nbName');
  var elTitle = document.getElementById('nbTitle');
  var elTitle2 = document.getElementById('nbTitle2');
  var currentTpl = 'B';
  var currentScheme = 'blue';
  var currentVisible = true;

  var p = location.search.substring(1).split('&');
  var roomId = '';
  for (var i = 0; i < p.length; i++) {
    var kv = p[i].split('=');
    if (kv[0] === 'room') roomId = decodeURIComponent(kv[1] || '');
  }
  if (!roomId) return;

  elName.textContent = '待添加';
  elTitle.textContent = '请先在操控台添加人员';

  function applyScheme(scheme) {
    if (scheme && scheme !== currentScheme) {
      bar.className = 'scheme-' + scheme;
      currentScheme = scheme;
    }
  }

  function render(persons, idx, tpl, visible, scheme) {
    if (tpl && tpl !== currentTpl) {
      inner.className = 'nb nb-' + tpl.toLowerCase();
      currentTpl = tpl;
    }
    applyScheme(scheme || currentScheme);
    if (idx >= 0 && idx < persons.length) {
      var p = persons[idx];
      elName.textContent = p.name || '';
      elTitle.textContent = p.title || '';
      elTitle2.textContent = p.title2 || '';
    } else {
      elName.textContent = '待添加';
      elTitle.textContent = '请先在操控台添加人员';
      elTitle2.textContent = '';
    }
    if (typeof visible === 'boolean') {
      currentVisible = visible;
      bar.style.opacity = visible ? '1' : '0';
    }
  }

  // WebSocket
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var wsUrl = proto + '//' + location.host + '/namebar/ws';
  var ws = null;

  function wsConnect() {
    try {
      ws = new WebSocket(wsUrl);
      ws.onopen = function() {
        ws.send(JSON.stringify({ type: 'join', roomId: roomId }));
      };
      ws.onmessage = function(ev) {
        var msg = JSON.parse(ev.data);
        if (msg.type === 'state' && msg.data) {
          var d = msg.data;
          render(d.persons || [], d.currentIndex, d.currentTemplate, d.visible, d.colorScheme);
        }
      };
      ws.onclose = function() { ws = null; };
      ws.onerror = function() { ws = null; };
    } catch(e) { ws = null; }
  }
  wsConnect();

  // XHR polling fallback
  function poll() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/namebar/api/state/' + roomId + '?_=' + Date.now(), true);
    xhr.timeout = 3000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        var d = JSON.parse(xhr.responseText);
        render(d.persons || [], d.currentIndex, d.currentTemplate, d.visible, d.colorScheme);
      }
    };
    xhr.onerror = function() {};
    xhr.send();
  }
  poll();
  setInterval(poll, 1000);
})();
</script>
</body>
</html>
